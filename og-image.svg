<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="85%" cy="15%" r="50%">
      <stop offset="0%" stop-color="rgba(232,97,42,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#080810"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Bordeaux tag top-left -->
  <rect x="60" y="52" width="160" height="30" rx="15" fill="rgba(232,97,42,0.12)" stroke="rgba(232,97,42,0.3)" stroke-width="1"/>
  <text x="140" y="72" font-family="DM Sans, sans-serif" font-weight="500" font-size="13" fill="#E8612A" text-anchor="middle" letter-spacing="0.1em">BORDEAUX · FRANCE</text>
  <!-- Name -->
  <text x="60" y="230" font-family="Syne, sans-serif" font-weight="800" font-size="108" fill="#ffffff" letter-spacing="-0.02em">MAXIME GIRARD</text>
  <!-- Title -->
  <text x="62" y="290" font-family="DM Sans, sans-serif" font-weight="500" font-size="32" fill="#7a7a9a">Directeur Marketing &amp; Growth B2B</text>
  <!-- Divider -->
  <rect x="60" y="330" width="80" height="3" rx="2" fill="#E8612A"/>
  <!-- Metric cards -->
  <!-- Card 1: +35M€ ARR -->
  <rect x="60" y="380" width="240" height="110" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="60" y="380" width="240" height="3" rx="2" fill="#E8612A"/>
  <text x="180" y="435" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#E8612A" text-anchor="middle">+35M€</text>
  <text x="180" y="465" font-family="DM Sans, sans-serif" font-weight="400" font-size="14" fill="#7a7a9a" text-anchor="middle">ARR générés ou pilotés</text>
  <!-- Card 2: 5 COMEX -->
  <rect x="320" y="380" width="240" height="110" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="320" y="380" width="240" height="3" rx="2" fill="#E8612A"/>
  <text x="440" y="435" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#E8612A" text-anchor="middle">5×</text>
  <text x="440" y="465" font-family="DM Sans, sans-serif" font-weight="400" font-size="14" fill="#7a7a9a" text-anchor="middle">Mandats COMEX</text>
  <!-- Card 3: 5 marchés -->
  <rect x="580" y="380" width="240" height="110" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="580" y="380" width="240" height="3" rx="2" fill="#E8612A"/>
  <text x="700" y="435" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#E8612A" text-anchor="middle">5</text>
  <text x="700" y="465" font-family="DM Sans, sans-serif" font-weight="400" font-size="14" fill="#7a7a9a" text-anchor="middle">Marchés internationaux</text>
  <!-- Card 4: 10 ans -->
  <rect x="840" y="380" width="240" height="110" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="840" y="380" width="240" height="3" rx="2" fill="#E8612A"/>
  <text x="960" y="435" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#E8612A" text-anchor="middle">10 ans</text>
  <text x="960" y="465" font-family="DM Sans, sans-serif" font-weight="400" font-size="14" fill="#7a7a9a" text-anchor="middle">Direction marketing B2B</text>
</svg>
